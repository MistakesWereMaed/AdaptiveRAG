# Combined configuration for AdaptiveRAG
# This single file gathers all stage-specific configs under explicit keys.
# Sections:
#  - paths
#  - hotpotqa
#  - llm
#  - retriever
#  - pipeline
#  - labels
#  - model
#  - train
#  - evaluate

# -------------------------
# Shared paths
# -------------------------
paths:
  hotpotqa_dir: &hotpotqa_dir data/hotpotqa
  train_data: &train_data data/hotpotqa/train.jsonl
  validation_data: &validation_data data/hotpotqa/validation.jsonl
  corpus: &corpus data/hotpotqa/corpus.jsonl
  index_dir: &index_dir data/index
  predictions_base: &predictions_base data/predictions/predictions.jsonl
  predictions_no_rag: &predictions_no_rag data/predictions/predictions-no-rag.jsonl
  predictions_single: &predictions_single data/predictions/predictions-single.jsonl
  predictions_multi: &predictions_multi data/predictions/predictions-multi.jsonl
  labeled_train: &labeled_train data/labeled/labeled_train.json
  labeled_stats: &labeled_stats data/labeled/labeled_train.stats.json

# -------------------------
# HotpotQA preprocessing
# -------------------------
hotpotqa:
  config_name: distractor
  build_corpus: true

# -------------------------
# LLM / generation defaults
# -------------------------
llm:
  model_name: google/flan-t5-xl
  device: cuda
  dtype: float16
  batch_size: 16
  max_input_length: 2048
  max_new_tokens: 32
  cot_max_new_tokens: 128
  query_max_new_tokens: 48
  num_beams: 1
  do_sample: false
  temperature: 1.0

# -------------------------
# Retriever
# -------------------------
retriever:
  encoder_name: BAAI/bge-base-en-v1.5
  top_k_single: 2
  top_k_multi: 4
  index_type: flat_l2
  dense:
    encoder_name: BAAI/bge-base-en-v1.5
    index_path: data/index

# -------------------------
# Pipeline defaults
# -------------------------
pipeline:
  strategy: single
  pipeline_batch_size: 64
  multi:
    steps: 2
    raw_k_per_query: 4

    mode: ircot
    initial_k: 4
    final_k: 8
    cot_max_new_tokens: 64

# -------------------------
# Debug logging
# -------------------------
debug:
  log_prompts: false
  max_logged_prompts: 100

# -------------------------
# Label generation
# -------------------------
labels:
  batch_size: 64
  min_f1: 0.5
  margin: 0.05

# -------------------------
# Model / classifier training
# -------------------------
model:
  model_name: bert-base-uncased
  num_classes: 3
  dropout: 0.1
  learning_rate: 2e-5
  max_length: 256

# -------------------------
# Training / experiment
# -------------------------
train:
  batch_size: 8
  max_epochs: 3
  use_wandb: true
  strategy: auto
  devices: auto
  num_nodes: 1
  precision: "fp16"
  accelerator: auto
  rebuild_index: false
  save_index: false

# -------------------------
# Evaluate stage
# -------------------------
evaluate:
  prediction_path_key: predictions_multi