# Combined configuration for AdaptiveRAG
# This single file gathers all stage-specific configs under explicit keys.
# Sections:
#  - paths
#  - hotpotqa
#  - llm
#  - retriever
#  - pipeline
#  - labels
#  - model
#  - train
#  - evaluate

# -------------------------
# Shared paths
# -------------------------
paths:
  hotpotqa_dir: &hotpotqa_dir data/hotpotqa

  # -------------------------
  # Dataset
  # -------------------------
  train_data: &train_data data/hotpotqa/train.jsonl
  validation_data: &validation_data data/hotpotqa/validation.jsonl
  corpus: &corpus data/hotpotqa/corpus.jsonl

  # -------------------------
  # Index
  # -------------------------
  index_dir: &index_dir data/index

  # -------------------------
  # Predictions
  # -------------------------
  predictions_train_base: &predictions_train_base data/predictions/train.jsonl
  predictions_validation_base: &predictions_validation_base data/predictions/validation.jsonl

  # Optional explicit paths (not required but useful for debugging)
  predictions_train_no_rag: data/predictions/train-no-rag.jsonl
  predictions_train_single: data/predictions/train-single.jsonl
  predictions_train_multi: data/predictions/train-multi.jsonl

  predictions_validation_no_rag: data/predictions/validation-no-rag.jsonl
  predictions_validation_single: data/predictions/validation-single.jsonl
  predictions_validation_multi: data/predictions/validation-multi.jsonl

  # -------------------------
  # Labels
  # -------------------------
  labeled_train: &labeled_train data/labeled/labeled_train.json
  labeled_validation: &labeled_validation data/labeled/labeled_validation.json

  labeled_train_stats: &labeled_train_stats data/labeled/labeled_train.stats.json
  labeled_validation_stats: &labeled_validation_stats data/labeled/labeled_validation.stats.json

  # -------------------------
  # Classifier
  # -------------------------
  router_checkpoint: checkpoints/best.ckpt

# -------------------------
# HotpotQA preprocessing
# -------------------------
hotpotqa:
  config_name: distractor
  build_corpus: true

# -------------------------
# LLM / generation defaults
# -------------------------
llm:
  model_name: google/flan-t5-xl
  device: cuda
  dtype: float16
  batch_size: 16
  max_input_length: 2048
  max_new_tokens: 32
  cot_max_new_tokens: 64
  query_max_new_tokens: 48
  num_beams: 1
  do_sample: false
  temperature: 1.0

# -------------------------
# Retriever
# -------------------------
retriever:
  encoder_name: BAAI/bge-base-en-v1.5
  top_k_single: 2
  top_k_multi: 4
  final_k_multi: 4
  # Index building parameters
  nlist: null  # Number of index clusters (optional, auto if null)
  nprobe: 8    # Number of clusters to probe during search
  batch_size: 1024  # Batch size for embedding and indexing
  smoke_test_k: 3   # Number of results to retrieve in smoke test

# -------------------------
# Pipeline defaults
# -------------------------
pipeline:
  strategy: all
  pipeline_batch_size: 128
  multi:
    steps: 2
  # Data generation parameters
  split: train  # Which dataset split to use: train or validation
  limit: 10000   # Max records to process (null for all)

# -------------------------
# Label generation
# -------------------------
labels:
  batch_size: 64
  min_f1: 0.5
  margin: 0.01
  correct_threshold: 0.6

# -------------------------
# Model / classifier training
# -------------------------
model:
  model_name: distilbert-base-uncased
  num_classes: 3
  dropout: 0.2
  learning_rate: 2e-5
  weight_decay: 0.05
  max_length: 256

# -------------------------
# Training / experiment
# -------------------------
train:
  batch_size: 32
  max_epochs: 10
  num_workers: 2
  val_split: 0.1
  seed: 42
  use_wandb: true
  strategy: auto
  devices: auto
  num_nodes: 1
  precision: "16-mixed"
  accelerator: auto
  checkpoints_dir: checkpoints
  early_stopping_patience: null
  wandb_project: adaptive-rag
  wandb_name: router
  log_every_n_steps: 25
  deterministic: false
  rebuild_index: false
  save_index: false

# -------------------------
# Evaluate stage
# -------------------------
evaluate:
  prediction_path_key: predictions_multi